services:
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/next/Dockerfile
    ports:
      - "3000:3000"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/python/Dockerfile
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    environment:
      - DATA_FILE=/app/data/config.json
      - UPLOAD_FOLDER=/app/data/uploads
    ports:
      - "5000:5000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/config')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  nginx:
    image: nginx:alpine
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./data/uploads:/usr/share/nginx/html/uploads:ro
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped